    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光绿径待办 - 数据仪表盘</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        body {
        --primary: #4CAF50;
        --primary-light: #81C784;
        --primary-dark: #388E3C;
        --accent: #66BB6A;
        --secondary: #2E7D32;
        --bg-body: #E8F5E9;
        --bg-gradient: linear-gradient(135deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%);
        --bg-card: #ffffff;
        --text-primary: #1B5E20;
        --text-secondary: #388E3C;
        --text-light: #66BB6A;
        --shadow-sm: 0 2px 8px rgba(76, 175, 80, 0.15);
        --shadow-md: 0 4px 16px rgba(76, 175, 80, 0.2);
        --shadow-lg: 0 8px 32px rgba(76, 175, 80, 0.25);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg-gradient);
        min-height: 100vh;
        padding: 20px;
        }

        .dashboard-container {
        max-width: 1400px;
        margin: 0 auto;
        }

        .dashboard-header {
        text-align: center;
        margin-bottom: 40px;
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }

        .dashboard-header h1 {
        font-size: 2.5em;
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        }

        .dashboard-header p {
        font-size: 1.1em;
        opacity: 0.98;
        }

        .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 30px;
        }

        .stat-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-lg);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        }

        .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-card-icon {
        width: 50px;
        height: 50px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        margin-bottom: 16px;
        }

        .stat-card-icon.blue { background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%); }
        .stat-card-icon.green { background: linear-gradient(135deg, #66BB6A 0%, #A5D6A7 100%); }
        .stat-card-icon.orange { background: linear-gradient(135deg, #81C784 0%, #C8E6C9 100%); }
        .stat-card-icon.purple { background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%); }

        .stat-card-value {
        font-size: 2.5em;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1;
        margin-bottom: 8px;
        }

        .stat-card-label {
        color: var(--text-secondary);
        font-size: 0.9em;
        font-weight: 500;
        margin-bottom: 12px;
        }

        .stat-card-trend {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85em;
        padding: 6px 10px;
        border-radius: 20px;
        width: fit-content;
        }

        .stat-card-trend.up {
        background: #e8f5e9;
        color: #2e7d32;
        }

        .stat-card-trend.down {
        background: #ffebee;
        color: #c62828;
        }

        .chart-section {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
        }

        .chart-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-md);
        }

        .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 2px solid #f0f0f0;
        }

        .chart-title {
        font-size: 1.2em;
        font-weight: 600;
        color: var(--text-primary);
        }

        .gauge-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        }

        .gauge-chart {
        position: relative;
        width: 200px;
        height: 200px;
        }

        .gauge-svg {
        transform: rotate(-90deg);
        }

        .gauge-bg {
        fill: none;
        stroke: #e0e0e0;
        stroke-width: 20;
        }

        .gauge-fill {
        fill: none;
        stroke: url(#gaugeGradient);
        stroke-width: 20;
        stroke-linecap: round;
        transition: stroke-dasharray 1s ease;
        }

        .gauge-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        }

        .gauge-value-number {
        font-size: 2.5em;
        font-weight: 700;
        color: var(--primary);
        }

        .gauge-value-label {
        font-size: 0.9em;
        color: var(--text-secondary);
        }

        .bar-chart {
        display: flex;
        align-items: flex-end;
        justify-content: space-around;
        height: 200px;
        padding: 20px 0;
        }

        .bar-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        }

        .bar {
        width: 40px;
        background: linear-gradient(180deg, var(--primary-light) 0%, var(--primary) 100%);
        border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        transition: height 1s ease;
        position: relative;
        }

        .bar-value {
        position: absolute;
        top: -25px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.85em;
        font-weight: 600;
        color: var(--text-primary);
        }

        .bar-label {
        font-size: 0.8em;
        color: var(--text-secondary);
        text-align: center;
        }

        .info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
        }

        .info-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-md);
        }

        .info-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        }

        .info-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5em;
        background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
        }

        .info-title {
        font-size: 1.1em;
        font-weight: 600;
        color: var(--text-primary);
        }

        .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        }

        .tag-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 20px;
        font-size: 0.9em;
        font-weight: 500;
        transition: transform 0.2s ease;
        }

        .tag-item:hover {
        transform: scale(1.05);
        }

        .tag-icon {
        font-size: 1.1em;
        }

        .user-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        }

        .user-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #f8f9fa;
        border-radius: var(--radius-md);
        transition: background 0.2s ease;
        }

        .user-item:hover {
        background: #f0f1f2;
        }

        .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 1.1em;
        }

        .user-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        }

        .user-info {
        flex: 1;
        }

        .user-name {
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
        }

        .user-meta {
        font-size: 0.85em;
        color: var(--text-secondary);
        }

        .user-todo-count {
        background: var(--primary);
        color: white;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.85em;
        font-weight: 600;
        }

        .dashboard-footer {
        text-align: center;
        padding: 20px;
        color: white;
        font-size: 0.9em;
        opacity: 0.9;
        }

        .dashboard-footer a {
        color: white;
        text-decoration: underline;
        font-weight: 600;
        }

        .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        color: white;
        }

        .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
        }

        @keyframes spin {
        to { transform: rotate(360deg); }
        }

        @media (max-width: 1200px) {
        .dashboard-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        
        .chart-section {
            grid-template-columns: 1fr;
        }
        
        .info-grid {
            grid-template-columns: 1fr;
        }
        }

        @media (max-width: 600px) {
        body {
            padding: 12px;
        }
        
        .dashboard-header h1 {
            font-size: 1.8em;
        }
        
        .dashboard-grid {
            grid-template-columns: 1fr;
        }
        
        .stat-card-value {
            font-size: 2em;
        }
        }
    </style>
    </head>
    <body>
    <div class="dashboard-container" id="dashboard">
        <div class="loading-container">
        <div class="spinner"></div>
        <p>数据加载中...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_BASE = 'https://api.yzjtiantian.cn';
        
        async function fetchAllData() {
        try {
            console.log('开始加载数据...');
            
            const [statsRes, tagsRes, usersRes, hourlyRes] = await Promise.all([
            fetch(`${API_BASE}/config/public-stats`).catch(err => {
                console.error('Stats API 失败:', err);
                return null;
            }),
            fetch(`${API_BASE}/config/public-tags`).catch(err => {
                console.error('Tags API 失败:', err);
                return null;
            }),
            fetch(`${API_BASE}/config/public-users?page=1&pageSize=10`).catch(err => {
                console.error('Users API 失败:', err);
                return null;
            }),
            fetch(`${API_BASE}/config/public-stats/hourly`).catch(err => {
                console.error('Hourly API 失败:', err);
                return null;
            })
            ]);
            
            const stats = statsRes ? await statsRes.json() : null;
            const tags = tagsRes ? await tagsRes.json() : null;
            const users = usersRes ? await usersRes.json() : null;
            const hourly = hourlyRes ? await hourlyRes.json() : null;
            
            console.log('Stats:', stats);
            console.log('Tags:', tags);
            console.log('Users:', users);
            console.log('Hourly:', hourly);
            
            if (stats && stats.success) {
            renderDashboard(
                stats.stats, 
                (tags && tags.success) ? tags.tags : [], 
                (users && users.success) ? users.users : [], 
                (hourly && hourly.success) ? hourly.data : null
            );
            } else {
            console.error('Stats API 返回失败:', stats);
            showError('统计数据加载失败');
            }
        } catch (error) {
            console.error('数据加载异常:', error);
            showError('网络请求失败，请检查网络连接');
        }
        }

        function formatNumber(num) {
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + 'w';
        }
        return num.toLocaleString();
        }

        function getInitials(name) {
        return name.charAt(0).toUpperCase();
        }

        function renderDashboard(stats, tags, users, hourlyData) {
        const container = document.getElementById('dashboard');
        
        container.innerHTML = `
            <div class="dashboard-header">
            <h1>🌿 时光绿径待办</h1>
            <p>简洁高效的待办事项管理工具 · 数据实时更新</p>
            </div>

            <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-card-icon blue">👥</div>
                <div class="stat-card-value">${formatNumber(stats.userCount)}</div>
                <div class="stat-card-label">注册用户</div>
                <div class="stat-card-trend up">📈 今日 +${stats.todayNewUsers}</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-card-icon green">✅</div>
                <div class="stat-card-value">${formatNumber(stats.todoCount)}</div>
                <div class="stat-card-label">待办事项</div>
                <div class="stat-card-trend up">📝 今日 +${stats.todayNewTodos}</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-card-icon orange">🎯</div>
                <div class="stat-card-value">${stats.completionRate}%</div>
                <div class="stat-card-label">完成率</div>
                <div class="stat-card-trend up">🏆 已完成 ${formatNumber(stats.completedTodoCount)}</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-card-icon purple">🔥</div>
                <div class="stat-card-value">${formatNumber(stats.activeUsers7Days)}</div>
                <div class="stat-card-label">周活跃用户</div>
                <div class="stat-card-trend up">⚡ 7 日内活跃</div>
            </div>
            </div>

            <div class="chart-section">
          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">📊 待办时段分布（最近 7 天）</div>
            </div>
            <div style="position: relative; height: 300px;">
              <canvas id="hourlyChart"></canvas>
            </div>
          </div>
            
            <div class="chart-card">
                <div class="chart-header">
                <div class="chart-title">🎯 完成率概览</div>
                </div>
                <div class="gauge-container">
                <div class="gauge-chart">
                    <svg class="gauge-svg" viewBox="0 0 100 100">
                    <defs>
                    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#81C784;stop-opacity:1" />
                    </linearGradient>
                  </defs>
                    <circle class="gauge-bg" cx="50" cy="50" r="40"/>
                    <circle class="gauge-fill" cx="50" cy="50" r="40" 
                        style="stroke-dasharray: ${2 * Math.PI * 40}; stroke-dashoffset: ${2 * Math.PI * 40 * (1 - stats.completionRate / 100)}"/>
                    </svg>
                    <div class="gauge-value">
                    <div class="gauge-value-number">${stats.completionRate}%</div>
                    <div class="gauge-value-label">完成率</div>
                    </div>
                </div>
                </div>
            </div>
            </div>

            <div class="info-grid">
            <div class="info-card">
                <div class="info-header">
                <div class="info-icon">🗂️</div>
                <div class="info-title">组合统计</div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div style="text-align: center;">
                <div style="font-size: 2em; font-weight: 700; color: #4CAF50;">${formatNumber(stats.comboCount)}</div>
                <div style="color: var(--text-secondary); font-size: 0.9em;">组合总数</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 2em; font-weight: 700; color: #66BB6A;">${formatNumber(stats.sharedComboCount)}</div>
                <div style="color: var(--text-secondary); font-size: 0.9em;">共享组合</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 2em; font-weight: 700; color: #2E7D32;">${formatNumber(stats.sharedTodoCount)}</div>
                <div style="color: var(--text-secondary); font-size: 0.9em;">共享待办</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 2em; font-weight: 700; color: #81C784;">${formatNumber(stats.memberCount)}</div>
                <div style="color: var(--text-secondary); font-size: 0.9em;">协作成员</div>
              </div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-header">
                <div class="info-icon">🏷️</div>
                <div class="info-title">热门标签</div>
                </div>
                <div class="tag-cloud">
                ${tags.slice(0, 15).map(tag => `
                    <div class="tag-item" style="background: ${tag.color}20; color: ${tag.color};">
                    <span class="tag-icon">${getTagIcon(tag.icon)}</span>
                    <span>${tag.name}</span>
                    <span style="opacity: 0.7;">(${tag.usageCount})</span>
                    </div>
                `).join('')}
                </div>
            </div>

            <div class="info-card">
                <div class="info-header">
                <div class="info-icon">👤</div>
                <div class="info-title">最新用户</div>
                </div>
                <div class="user-list">
                ${users.map(user => `
                    <div class="user-item">
                    <div class="user-avatar">
                        ${user.avatarUrl ? `<img src="${user.avatarUrl}" alt="${user.nickname}">` : getInitials(user.nickname)}
                    </div>
                    <div class="user-info">
                        <div class="user-name">${user.nickname}</div>
                        <div class="user-meta">${formatDate(user.createdAt)}</div>
                    </div>
                    <div class="user-todo-count">${user.todoCount} 待办</div>
                    </div>
                `).join('')}
                </div>
            </div>
            </div>

            <div class="dashboard-footer">
            <p>数据实时更新 · 由 <a href="https://api.yzjtiantian.cn" target="_blank">时光绿径 API</a> 提供支持</p>
            <p style="margin-top: 8px;">微信搜索「时光绿径待办」体验 · 当前版本 v${stats.latestVersion}</p>
            </div>
        `;

        // 渲染时段分布图表
        renderHourlyChart(hourlyData);
        }

        function getTagIcon(iconName) {
        const iconMap = {
            'briefcase': '💼',
            'home': '🏠',
            'shopping': '🛒',
            'fitness': '🏃',
            'book': '📚',
            'camera': '📷',
            'music': '🎵',
            'food': '🍔',
            'travel': '✈️',
            'work': '💻',
            'study': '📖',
            'health': '❤️',
            'default': '🏷️'
        };
        return iconMap[iconName] || iconMap.default;
        }

        function formatDate(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        if (days === 0) return '今天';
        if (days === 1) return '昨天';
        if (days < 7) return `${days}天前`;
        
        const month = date.getMonth() + 1;
        const day = date.getDate();
        return `${month}月${day}日`;
        }

        function renderHourlyChart(hourlyData) {
      const canvas = document.getElementById('hourlyChart');
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      
      // 检查是否已经渲染过，避免重复渲染
      const existingChart = Chart.getChart(canvas);
      if (existingChart) {
        existingChart.destroy();
      }
      
      // 使用真实 API 数据
      const data = hourlyData && hourlyData.hourlyDistribution ? hourlyData.hourlyDistribution : [];
      
      if (data.length === 0) {
        canvas.parentElement.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <div style="font-size: 3em; margin-bottom: 10px;">📊</div>
            <p>暂无数据</p>
          </div>
        `;
        return;
      }
      
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.hourLabel),
          datasets: [{
            label: '待办创建数',
            data: data.map(d => d.count),
            backgroundColor: 'rgba(76, 175, 80, 0.7)',
            borderColor: 'rgba(46, 125, 50, 1)',
            borderWidth: 1,
            borderRadius: 6,
            hoverBackgroundColor: 'rgba(46, 125, 50, 0.9)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 2,
          animation: {
            duration: 800,
            easing: 'easeOutQuart'
          },
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(27, 94, 32, 0.9)',
              titleColor: '#fff',
              bodyColor: '#fff',
              borderColor: '#81C784',
              borderWidth: 2,
              padding: 12,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return `创建数：${context.parsed.y}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(76, 175, 80, 0.1)'
              },
              ticks: {
                precision: 0,
                color: '#388E3C'
              }
            },
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: '#388E3C'
              }
            }
          }
        }
      });
    }

        function showError(message) {
      const container = document.getElementById('dashboard');
      container.innerHTML = `
        <div class="loading-container">
          <div style="font-size: 4em; margin-bottom: 20px;">⚠️</div>
          <h2 style="margin-bottom: 10px;">${message || '数据加载失败'}</h2>
          <p>请稍后刷新重试，或检查网络连接</p>
          <button onclick="location.reload()" style="margin-top: 20px; padding: 12px 30px; background: white; color: #4CAF50; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: 600;">🔄 刷新页面</button>
        </div>
      `;
    }

        if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fetchAllData);
        } else {
        fetchAllData();
        }
    </script>
    </body>
    </html>
